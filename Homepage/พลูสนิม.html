<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
        <meta name="description" content="" />
        <meta name="author" content="" />
        <title>ต้นไม้บ้านสุวรรณ</title>
        <!-- Favicon-->
        <link rel="icon" type="image/x-icon" href="img/favicon_head.ico" />
        <!-- Bootstrap icons-->
        <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.5.0/font/bootstrap-icons.css" rel="stylesheet" />
        <!-- Core theme CSS (includes Bootstrap)-->
        <link href="in_shop.css" rel="stylesheet" />
         <script src="scripts.js" defer></script>
    </head>
     <body>
  
        <!-- Header ร้าน -->
        <div class="header">
            <h1>ร้านต้นไม้บ้านสุวรรณ</h1>
            <p>ร้านขายต้นไม้และอุปกรณ์ปลูกต้นไม้</p>
        </div>

        <!-- รายละเอียดสินค้า -->
        <div class="container-product">

            <div class="product-image">

                <div class="main-img">
                    <img src="tree_img_shop/ต้นพลูสนิม.webp" width="50%">
                    รูปสินค้า
                </div>

                <div class="thumbnails">
                <div class="thumb">รูป 1</div>
                <div class="thumb">รูป 2</div>
                <div class="thumb">รูป 3</div>
                <div class="thumb">รูป 4</div>
            </div>

        </div>

        <div class="product-info">

            <div class="title">
            ต้นไม้ฟอกอากาศในบ้าน
            </div>

            <div class="rating">
             ⭐⭐⭐⭐⭐ 4.8 (รีวิว 2,300)
            </div>

            <div class="price">
              ฿199
            </div>

            <div>ขนาดกระถาง</div>

                <div class="options">
                    <button>S</button>
                    <button>M</button>
                    <button>L</button>
                </div>

                <br>
                <div>
                จำนวน
                    <input type="number" value="1" min="1">
                </div>

                <div class="buttons">
                    <button class="cart">เพิ่มไปยังรถเข็น</button>
                    <button class="buy">ซื้อสินค้า</button>
                </div>

            </div>

        </div>

        <!-- Footer-->
        <footer class="py-5 bg-dark">
            <div class="container"><p class="m-0 text-center text-white">Pheeraphat Meksuwan</p></div>
        </footer>

    </body>
</html>
